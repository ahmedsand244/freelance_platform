{% load i18n %}

<!-- 🚀 THE PULSATING NEON LAUNCHER -->
<button id="chat-open-fab" onclick="openChat()" style="
  position: fixed; bottom: 30px; right: 30px;
  width: 70px; height: 70px;
  background: linear-gradient(135deg, #4f46e5, #9333ea, #ec4899);
  background-size: 200% 200%;
  animation: gradientFlow 3s ease infinite, pulseGlow 2s infinite;
  color: white; border: none; border-radius: 24px;
  box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
  cursor: pointer; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
" onmouseover="this.style.transform='scale(1.15) rotate(10deg)'" onmouseout="this.style.transform='scale(1) rotate(0deg)'">
  <i class="fas fa-comment-dots"></i>
  <span id="chat-badge" style="
    position: absolute; top: -5px; right: -5px;
    background: #ff4757; color: white;
    width: 22px; height: 22px; border-radius: 8px;
    font-size: 11px; display: flex; align-items: center; justify-content: center;
    font-weight: 900; border: 2.5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  ">1</span>
</button>

<!-- 🎭 THE TRIPLE-GLASS CHAT PANEL -->
<div id="ai-chat-popup" style="
  position: fixed; bottom: 115px; right: 30px;
  width: 380px; height: 550px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(25px) saturate(180%);
  -webkit-backdrop-filter: blur(25px) saturate(180%);
  border-radius: 35px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.15);
  display: none;
  flex-direction: column;
  overflow: hidden;
  font-family: 'Outfit', 'Cairo', sans-serif;
  z-index: 9999;
  border: 1.5px solid rgba(255, 255, 255, 0.5);
  transform-origin: bottom right;
  animation: spiritReveal 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
">
  
  <!-- Animated Background Spirits (Blobs) -->
  <div style="position: absolute; top: -50px; left: -50px; width: 200px; height: 200px; background: rgba(79, 70, 229, 0.1); border-radius: 50%; filter: blur(40px); z-index: -1; animation: floatBlob 10s infinite alternate;"></div>
  <div style="position: absolute; bottom: -50px; right: -50px; width: 200px; height: 200px; background: rgba(236, 72, 153, 0.1); border-radius: 50%; filter: blur(40px); z-index: -1; animation: floatBlob 7s infinite alternate-reverse;"></div>

  <!-- 👑 DYNAMIC MESH HEADER -->
  <div id="chat-header" style="
    background: linear-gradient(-45deg, #4f46e5, #7c3aed, #db2777, #2563eb);
    background-size: 300% 300%;
    animation: gradientFlow 5s ease infinite;
    color: white; padding: 25px;
    display: flex; justify-content: space-between; align-items: center;
    direction: rtl; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  ">
    <div style="display:flex; align-items:center; gap: 15px;">
      <div style="
        width: 45px; height: 45px; background: rgba(255,255,255,0.2);
        border-radius: 16px; display:flex; align-items:center; justify-content:center;
        font-size: 22px; position: relative; border: 1.5px solid rgba(255,255,255,0.3);
      ">
        🤖
        <div style="position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; background: #10b981; border: 2.5px solid #4f46e5; border-radius: 50%;"></div>
      </div>
      <div>
        <div style="font-weight: 900; font-size: 17px; letter-spacing: -0.5px;">تركي - المساعد الذكي</div>
        <div style="font-size: 12px; opacity: 0.9; font-weight: 600; display: flex; align-items: center; gap: 5px;">
           <span class="online-dot"></span> {% trans "Pulse Online" %}
        </div>
      </div>
    </div>
    <button onclick="closeChat()" style="
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 35px; height: 35px; border-radius: 12px;
      cursor: pointer; font-size: 16px; display:flex; align-items:center; justify-content:center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    " onmouseover="this.style.background='rgba(255,255,255,0.3)'; this.style.transform='rotate(90deg)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='rotate(0deg)'">✕</button>
  </div>

  <!-- 💬 THE LIVING MESSAGES AREA -->
  <div id="chat-messages" style="
    flex: 1; padding: 25px;
    overflow-y: auto; background: transparent;
    display: flex; flex-direction: column; gap: 20px;
    direction: rtl; scroll-behavior: smooth;
  ">
    <!-- Initial Bot Spirit Message -->
    <div class="bot-msg-wrapper" style="display:flex; align-items:flex-end; gap:12px; animation: msgPop 0.5s ease forwards;">
      <div class="bot-avatar" style="
        width: 36px; height: 36px; background: linear-gradient(135deg, #4f46e5, #db2777);
        border-radius: 12px; display:flex; align-items:center; justify-content:center;
        font-size: 16px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
      ">🤖</div>
      <div class="bot-msg-box" style="
        background: white; padding: 16px 20px;
        border-radius: 22px; border-bottom-right-radius: 4px;
        max-width: 85%; font-size: 14.5px; color: #1e293b;
        box-shadow: 0 8px 25px rgba(0,0,0,0.05); line-height: 1.6;
        font-weight: 600; border: 1px solid rgba(0,0,0,0.02);
      ">
        {% trans "مرحباً بك في تركي! 👋 أنا مساعدك الذكي المفعم بالحيوية، كيف يمكنني إبهارك اليوم؟" %}
      </div>
    </div>
  </div>

  <!-- ✨ INTERACTIVE QUICK HUB -->
  <div id="quick-suggestions" style="
    padding: 15px 20px; background: rgba(255,255,255,0.5);
    display: flex; gap: 12px; flex-wrap: nowrap; overflow-x: auto; 
    direction: rtl; border-top: 1px solid rgba(0,0,0,0.05);
    scrollbar-width: none;
    -ms-overflow-style: none;
  ">
    <button onclick="sendQuick('{% trans 'ما هي الخدمات المتاحة؟' %}')" class="quick-btn">✨ {% trans "استكشاف الخدمات" %}</button>
    <button onclick="sendQuick('{% trans 'كيف أطلب خدمة؟' %}')" class="quick-btn">💎 {% trans "كيفية الطلب" %}</button>
    <button onclick="sendQuick('{% trans 'طرق الدفع المتاحة' %}')" class="quick-btn">💳 {% trans "طرق السداد" %}</button>
  </div>

  <!-- ⌨️ HYPER-GLASS INPUT -->
  <div style="
    display: flex; padding: 20px; border-top: 1px solid rgba(0,0,0,0.05);
    background: rgba(255,255,255,0.8); gap: 12px; align-items: center;
    direction: rtl;
  ">
    <input type="text" id="chat-input"
      placeholder="{% trans 'Talk to Torki Spirit...' %}"
      style="
        flex: 1; padding: 15px 20px;
        border: 2px solid rgba(79, 70, 229, 0.05); border-radius: 22px;
        outline: none; font-size: 15px; font-family: inherit; font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: #f8faff;
        color: #1e293b;
      "
      onfocus="this.style.borderColor='#4f46e5'; this.style.background='white'; this.style.boxShadow='0 10px 20px rgba(79, 70, 229, 0.1)'"
      onblur="this.style.borderColor='rgba(79, 70, 229, 0.05)'; this.style.background='#f8faff'; this.style.boxShadow='none'"
      onkeypress="handleEnter(event)"
    >
    <button id="chat-send-btn" onclick="sendMessage()" style="
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white; border: none; border-radius: 18px;
      width: 52px; height: 52px; min-width: 52px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
      transition: all 0.3s ease;
    " onmouseover="this.style.transform='scale(1.1) rotate(-15deg)'" onmouseout="this.style.transform='scale(1) rotate(0deg)'">
      <i class="fas fa-paper-plane" style="font-size: 18px;"></i>
    </button>
  </div>
</div>

<style>
  /* Base Spirit Animations */
  @keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes pulseGlow {
    0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.5); }
    70% { box-shadow: 0 0 0 20px rgba(79, 70, 229, 0); }
    100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
  }
  @keyframes spiritReveal {
    0% { opacity: 0; transform: scale(0.5) translateY(100px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes floatBlob {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 30px) scale(1.2); }
  }
  @keyframes msgPop {
    0% { opacity: 0; transform: scale(0.8) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes dotBounce {
     0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
     40% { transform: translateY(-8px); opacity: 1; }
  }
  .online-dot {
    width: 8px; height: 8px; background: #10b981; border-radius: 50%;
    animation: pulseGlow 1.5s infinite;
  }
  .quick-btn {
    background: white; border: 1.5px solid rgba(79, 70, 229, 0.1); 
    color: #4f46e5; padding: 10px 18px; border-radius: 16px; 
    font-size: 13px; font-weight: 800; cursor: pointer; 
    white-space: nowrap; transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.03);
  }
  .quick-btn:hover {
    background: #4f46e5; color: white; transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(79, 70, 229, 0.2);
  }
  
  /* 精 🔥 THE DARK MODE SPIRIT REFINEMENT */
  html.dark-mode #ai-chat-popup {
    background: rgba(15, 23, 42, 0.9) !important;
    border-color: rgba(255, 255, 255, 0.08) !important;
    backdrop-filter: blur(40px) saturate(200%) !important;
  }
  html.dark-mode #chat-messages { background: transparent !important; }
  html.dark-mode #chat-header { border-bottom: 1px solid rgba(255,255,255,0.05); }
  
  /* Fix: Bot message bubbles in dark mode */
  html.dark-mode .bot-msg-box {
    background: #1e293b !important;
    color: #f1f5f9 !important;
    border: 1px solid rgba(255,255,255,0.03) !important;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2) !important;
  }
  
  /* Fix: Suggestion rail in dark mode */
  html.dark-mode #quick-suggestions {
    background: rgba(15, 23, 42, 0.6) !important;
    border-top-color: rgba(255,255,255,0.05) !important;
  }
  html.dark-mode .quick-btn {
    background: rgba(30, 41, 59, 0.9) !important;
    border-color: rgba(255,255,255,0.05) !important;
    color: #a5b4fc !important;
  }
  html.dark-mode .quick-btn:hover {
     background: #4f46e5 !important;
     color: white !important;
  }
  
  /* Fix: Input area in dark mode */
  html.dark-mode #chat-input {
    background: rgba(30, 41, 59, 0.8) !important;
    border-color: rgba(255,255,255,0.08) !important;
    color: #ffffff !important;
  }
  html.dark-mode #ai-chat-popup > div:last-child {
    background: rgba(15, 23, 42, 0.95) !important;
    border-top-color: rgba(255,255,255,0.05) !important;
  }

  /* Universal Bot Message Class Trigger */
  .bot-msg-box { transition: all 0.3s ease; }
</style>

<script>
  const messagesDiv = document.getElementById('chat-messages');
  const chatInput   = document.getElementById('chat-input');
  const sendBtn     = document.getElementById('chat-send-btn');
  const chatPanel   = document.getElementById('ai-chat-popup');
  const chatFab     = document.getElementById('chat-open-fab');

  function openChat() {
    chatPanel.style.display = 'flex';
    chatFab.style.opacity = '0.5';
    chatFab.style.pointerEvents = 'none';
    chatInput.focus();
    const badge = document.getElementById('chat-badge');
    if (badge) badge.style.display = 'none';
  }

  function closeChat() {
    chatPanel.style.animation = 'spiritReveal 0.4s reverse cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';
    setTimeout(() => {
      chatPanel.style.display = 'none';
      chatPanel.style.animation = 'spiritReveal 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
      chatFab.style.opacity = '1';
      chatFab.style.pointerEvents = 'auto';
    }, 400);
  }

  function handleEnter(e) {
    if (e.key === 'Enter') sendMessage();
  }

  function sendQuick(text) {
    chatInput.value = text;
    sendMessage();
  }

  function appendMessage(text, sender) {
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.alignItems = 'flex-end';
    wrapper.style.gap = '12px';
    wrapper.style.animation = 'msgPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';

    const msgDiv = document.createElement('div');
    msgDiv.style.padding = '16px 20px';
    msgDiv.style.borderRadius = '22px';
    msgDiv.style.maxWidth = '85%';
    msgDiv.style.fontSize = '14.5px';
    msgDiv.style.lineHeight = '1.6';
    msgDiv.style.fontWeight = '600';

    if (sender === 'user') {
      wrapper.style.flexDirection = 'row-reverse';
      msgDiv.style.background = 'linear-gradient(135deg, #4f46e5, #7c3aed)';
      msgDiv.style.color = 'white';
      msgDiv.style.borderBottomLeftRadius = '4px';
      msgDiv.style.boxShadow = '0 10px 25px rgba(79, 70, 229, 0.2)';
    } else {
      const avatar = document.createElement('div');
      avatar.style.cssText = 'width:36px;height:36px;background:linear-gradient(135deg, #4f46e5, #db2777);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);';
      avatar.textContent = '🤖';
      wrapper.appendChild(avatar);
      msgDiv.classList.add('bot-msg-box');
      msgDiv.style.background = 'white';
      msgDiv.style.color = '#1e293b';
      msgDiv.style.borderBottomRightRadius = '4px';
      msgDiv.style.boxShadow = '0 8px 25px rgba(0,0,0,0.05)';
      msgDiv.style.border = '1px solid rgba(0,0,0,0.02)';
    }

    msgDiv.innerText = text;
    wrapper.appendChild(msgDiv);
    messagesDiv.appendChild(wrapper);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function addTypingIndicator() {
    const wrapper = document.createElement('div');
    wrapper.id = 'typing-indicator';
    wrapper.style.cssText = 'display:flex;align-items:flex-end;gap:12px;direction:rtl;animation: msgPop 0.3s ease;';
    wrapper.innerHTML = `
      <div style="width:36px;height:36px;background:linear-gradient(135deg,#4f46e5,#db2777);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🤖</div>
      <div style="background:white;padding:16px 20px;border-radius:22px;border-bottom-right-radius:4px;box-shadow:0 8px 25px rgba(0,0,0,0.05);">
        <span style="display:inline-flex;gap:6px;">
          <span style="width:8px;height:8px;background:#4f46e5;border-radius:50%;animation:dotBounce 1.2s infinite;"></span>
          <span style="width:8px;height:8px;background:#4f46e5;border-radius:50%;animation:dotBounce 1.2s infinite 0.2s;"></span>
          <span style="width:8px;height:8px;background:#4f46e5;border-radius:50%;animation:dotBounce 1.2s infinite 0.4s;"></span>
        </span>
      </div>`;
    messagesDiv.appendChild(wrapper);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const message = chatInput.value.trim();
    if (!message) return;

    appendMessage(message, 'user');
    chatInput.value = '';
    chatInput.disabled = true;
    sendBtn.disabled = true;
    addTypingIndicator();

    try {
      const response = await fetch('{% url "chatbot_response" %}', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({ message })
      });
      const data = await response.json();
      removeTypingIndicator();
      appendMessage(response.ok ? data.reply : (data.reply || '{% trans "حدث خطأ فني." %}'), 'bot');
    } catch {
      removeTypingIndicator();
      appendMessage('{% trans "أواجه صعوبة في الاتصال بالشبكة الرقمية حالياً. حاول ثانية." %}', 'bot');
    } finally {
      chatInput.disabled = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }
</script>
